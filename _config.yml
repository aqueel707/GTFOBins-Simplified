title: GTFOBins-Simplified
description: Operator-focused GTFOBins fork — fast binary lookup, tactical context.
baseurl: ""
url: ""

collections:
  binaries:
    output: true
    permalink: /b/:name/

defaults:
  - scope:
      path: ""
      type: binaries
    values:
      layout: binary

markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - schema/
  - "*.sh"
  - README.md
  - node_modules/

plugins:
  - jekyll-seo-tag
