title: GTFOBins-Simplified
description: Operator-focused GTFOBins fork — fast binary lookup, tactical context.
baseurl: "/GTFOBins-Simplified"
url: "https://aqueel707.github.io"

# Disable the default jekyll-theme-primer (causes layout conflicts)
theme: null
remote_theme: null

collections:
  binaries:
    output: true
    permalink: /b/:name/

defaults:
  - scope:
      path: ""
      type: binaries
    values:
      layout: binary

markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - scripts/
  - schema/
  - .github/
  - "*.md"
  - "*.py"
  - "*.sh"
  - node_modules/
  - venv/

include:
  - pages

plugins:
  - jekyll-seo-tag
