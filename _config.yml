title: GTFOBins-Simplified
description: Operator-focused GTFOBins fork — fast binary lookup, tactical context.
baseurl: "/GTFOBins-Simplified"
url: "https://aqueel707.github.io"

theme: null
remote_theme: null

collections:
  binaries:
    output: true
    permalink: /b/:name/

defaults:
  - scope:
      path: ""
      type: binaries
    values:
      layout: binary

markdown: kramdown
highlighter: rouge

exclude:
  - README.md
  - STRUCTURE.md
  - CONTRIBUTING.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - scripts/
  - schema/
  - .github/
  - venv/
  - node_modules/
  - "*.py"
  - "*.sh"

include:
  - pages

plugins:
  - jekyll-seo-tag
